<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Your Wedding Dreams</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f8f1e7;
      --gold: #d4a53a;
      --text: #2b1a10;
      --soft: #6f5540;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fffaf0 0%, var(--cream) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .error-card {
      width: min(720px, 100%);
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(180, 140, 60, 0.2);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(100, 70, 30, 0.12);
      padding: clamp(24px, 5vw, 48px);
      text-align: center;
    }

    .brand-logo {
      width: 74px;
      height: 74px;
      object-fit: contain;
      margin: 0 auto 12px;
      display: block;
    }

    .error-visual {
      width: min(100%, 560px);
      height: clamp(180px, 34vw, 260px);
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(180, 140, 60, 0.22);
      box-shadow: 0 12px 28px rgba(100, 70, 30, 0.12);
      margin: 0 auto 16px;
      display: block;
    }

    .code {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 4rem);
      line-height: 1;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    h1 {
      margin: 12px 0 10px;
      font-family: "Playfair Display", serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      line-height: 1.15;
    }

    p {
      margin: 0 auto 22px;
      max-width: 560px;
      color: var(--soft);
      font-size: 1rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 11px 18px;
      border-radius: 999px;
      border: 1px solid rgba(180, 140, 60, 0.24);
      color: var(--text);
      background: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(100, 70, 30, 0.14);
      background: linear-gradient(135deg, #f4c55f, #d4a53a);
    }
  </style>
</head>
<body>
  <main class="error-card">
    <img class="brand-logo" src="/images/logo.png" alt="Your Wedding Dreams logo">
    <p class="code">404</p>
    <img class="error-visual" src="/images/error-404-cover.png" alt="Wedding memory visual">
    <h1>Oops! Page not found.</h1>
    <p>The page you are looking for does not exist or has been moved. Please go back to the homepage and continue exploring.</p>
    <div class="actions">
      <a class="btn" href="/index.html">Go to Home</a>
      <a class="btn" href="/contact.html#booking-form">Contact Us</a>
    </div>
  </main>
</body>
</html>
